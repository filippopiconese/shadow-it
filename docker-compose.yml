# Local Postgres for development. Start with: docker compose up -d
# The connection string is in .env.example (port 5433 to avoid clashing with a
# system Postgres on 5432).
services:
  db:
    image: postgres:16-alpine
    container_name: shadowit-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shadowit
    ports:
      - "5433:5432"
    volumes:
      - shadowit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shadowit-pgdata:
