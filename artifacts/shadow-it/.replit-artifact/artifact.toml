kind = "web"
previewPath = "/"
title = "Shadow IT Detector"
version = "1.0.0"
id = "artifacts/shadow-it"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25255

[services.development]
run = "pnpm --filter @workspace/shadow-it run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadow-it", "run", "build" ]
publicDir = "artifacts/shadow-it/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25255"
BASE_PATH = "/"
