    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ShadowGuard",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Web",
      "url": "https://shadowit.micro-saas.it",
      "description": "Shadow IT detection for Google Workspace and Microsoft 365. Discover and risk-score every unauthorized OAuth app connected by your employees.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR",
        "description": "Free during launch period"
      },
      "creator": {
        "@type": "Organization",
        "name": "Micro SaaS",
        "url": "https://www.micro-saas.it"
      },
      "featureList": [
        "OAuth app inventory for Google Workspace and Microsoft 365",
        "Automatic risk scoring of third-party applications",
        "Authorized users and scopes visibility per app",
        "Email alerts for newly detected high-risk apps",
        "Scheduled daily scans",
        "Self-service 1-click onboarding"
      ]
    }
    </script>

    <!-- Structured Data — FAQPage (landing) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is shadow IT?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Shadow IT refers to third-party applications that employees connect to your company's Google Workspace or Microsoft 365 without IT approval. These apps receive OAuth permissions (scopes) that can include reading emails, accessing files, or managing contacts — creating data-leak risks that administrators can't see from the standard admin console."
          }
        },
        {
          "@type": "Question",
          "name": "How does ShadowGuard detect unauthorized apps?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ShadowGuard connects to your Google Workspace (via Admin SDK) or Microsoft 365 tenant (via Microsoft Graph) with read-only permissions. It enumerates every OAuth grant and delegated permission across all users, identifies the third-party applications behind them, and scores each app by risk based on the sensitivity of the scopes it was granted and how many users authorized it."
          }
        },
        {
          "@type": "Question",
          "name": "Does ShadowGuard read my emails or files?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. ShadowGuard requests only read-only directory and token-listing scopes. It never accesses the content of emails, Drive/OneDrive files, calendars, or chats. It reads authorization metadata only — which apps are connected and what permissions they have."
          }
        },
        {
          "@type": "Question",
          "name": "Is ShadowGuard free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. During the launch period all features are free with no commitment or credit card required. When paid plans launch, early adopters who connected during the free period will keep their access."
          }
        },
        {
          "@type": "Question",
          "name": "Which platforms does ShadowGuard support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ShadowGuard supports Google Workspace and Microsoft 365. A Google Workspace super-admin or a Microsoft 365 global administrator can connect their environment in about 30 seconds."
          }
        }
      ]
    }
    </script>
