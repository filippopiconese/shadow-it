name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup pnpm
        # Installed via npm (not pnpm/action-setup, which still targets Node 20).
        # Same version as the Dockerfile.
        run: npm install -g pnpm@11.5.1

      - name: Install dependencies
        # --ignore-scripts: pnpm 11 exits non-zero in non-TTY over "ignored build
        # scripts"; our deps don't need postinstall (prebuilt binaries).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
