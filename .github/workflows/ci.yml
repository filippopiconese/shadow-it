name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable pnpm via corepack
        # corepack ships with Node 24 (runs on Node 24, no deprecation notice).
        # Picks the pnpm version from the "packageManager" field in package.json.
        run: |
          corepack enable pnpm
          pnpm --version

      - name: Install dependencies
        # --ignore-scripts: pnpm 11 exits non-zero in non-TTY over "ignored build
        # scripts"; our deps don't need postinstall (prebuilt binaries).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
